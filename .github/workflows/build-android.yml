name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: client

      - name: Decode keystore
        id: decode_keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > client/android/app/keystore.jks
          echo "keystore_exists=true" >> $GITHUB_OUTPUT

      - name: Build release APK
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${{ steps.decode_keystore.outputs.keystore_exists }}" = "true" ]; then
            flutter build apk --release \
              --dart-define=SERVER_URL=https://${{ secrets.SERVER_HOST || 'vpn.example.com' }}:8080
          else
            flutter build apk --debug \
              --dart-define=SERVER_URL=https://${{ secrets.SERVER_HOST || 'vpn.example.com' }}:8080
          fi
        working-directory: client

      - name: Get version
        id: get_version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "apk_path=$(find client/build -name '*.apk' -type f | head -1)" >> $GITHUB_OUTPUT

      - name: Upload APK to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.get_version.outputs.apk_path }}
          # Generic name so /releases/latest/download/vpn-client-android.apk always resolves
          asset_name: vpn-client-android.apk
          tag: ${{ github.ref }}
          overwrite: true
