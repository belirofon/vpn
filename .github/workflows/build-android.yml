name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$(dirname $(dirname $(which flutter)))" > android/local.properties
          echo "sdk.dir=${ANDROID_HOME:-$HOME/android}" >> android/local.properties
          cat android/local.properties

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            mkdir -p android/app
            echo "$KEYSTORE_B64" | base64 -d > android/app/keystore.jks 2>/dev/null && \
              echo "keystore=exists" >> "$GITHUB_OUTPUT" || \
              echo "keystore=none" >> "$GITHUB_OUTPUT"
          else
            echo "keystore=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify keystore password
        if: steps.keystore.outputs.keystore == 'exists'
        run: |
          keytool -list -keystore android/app/keystore.jks \
            -storepass '${{ secrets.ANDROID_STORE_PASSWORD }}' \
            -alias '${{ secrets.ANDROID_KEY_ALIAS }}' 2>&1 || {
            echo "❌ Keystore password/alias mismatch. Check ANDROID_STORE_PASSWORD, ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS secrets."
            exit 1
          }

      - name: Create key.properties
        if: steps.keystore.outputs.keystore == 'exists'
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Extract version
        id: version
        run: |
          # If triggered by tag (v1.2.3) → "1.2.3", otherwise "0.0.0"
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${TAG:-0.0.0}" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build APK (signed release)
        if: steps.keystore.outputs.keystore == 'exists'
        run: >
          flutter build apk --release
          --build-name=${{ steps.version.outputs.version }}
          --build-number=${{ steps.version.outputs.build_number }}
          --dart-define=SERVER_URL=${{ vars.SERVER_URL }}
          --dart-define=APP_VERSION=${{ steps.version.outputs.version }}
        # Set SERVER_URL in GitHub repo → Settings → Secrets and variables → Actions → Variables

      - name: Build APK (debug — unsigned)
        if: steps.keystore.outputs.keystore != 'exists'
        run: >
          flutter build apk --debug
          --build-name=${{ steps.version.outputs.version }}
          --build-number=${{ steps.version.outputs.build_number }}
          --dart-define=SERVER_URL=${{ vars.SERVER_URL }}
          --dart-define=APP_VERSION=${{ steps.version.outputs.version }}

      - name: Rename APK for release upload
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/vpn-client-android.apk 2>/dev/null || \
          cp build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/vpn-client-android.apk

      - name: Upload APK to server
        if: steps.keystore.outputs.keystore == 'exists' && vars.SERVER_URL != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "client/build/app/outputs/flutter-apk/vpn-client-android.apk"
          target: "~/vpn-server/apk/"
          strip_components: 5

      - name: Update version.json on server
        if: steps.keystore.outputs.keystore == 'exists' && vars.SERVER_URL != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/vpn-server
            CHANGELOG="- REALITY support\n- Admin panel\n- Server selection\n- In-app updates"
            cat > apk/version.json <<VERSION_EOF
            {
              "version": "${{ steps.version.outputs.version }}",
              "build_number": ${{ steps.version.outputs.build_number }},
              "download_url": "https://${{ vars.DOMAIN }}:8443/api/update/download",
              "changelog": "${CHANGELOG}"
            }
            VERSION_EOF
            ls -la apk/
            echo "=== version.json updated ==="

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: client/build/app/outputs/flutter-apk/vpn-client-android.apk
