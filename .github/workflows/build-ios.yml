name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get
        working-directory: client

      - name: Install CocoaPods
        run: |
          cd client/ios
          pod install || (flutter precache --ios && pod install)

      - name: Import signing certificate
        if: ${{ secrets.IOS_P12_BASE64 != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install provisioning profile
        if: ${{ secrets.IOS_PROVISIONING_BASE64 != '' }}
        run: |
          echo "${{ secrets.IOS_PROVISIONING_BASE64 }}" | base64 -d > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          uuid=$(grep -aA1 UUID /tmp/profile.mobileprovision | grep -oE '[A-F0-9-]{36}' | head -1)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$uuid.mobileprovision
          echo "Installed profile: $uuid"

      - name: Set Xcode team
        if: ${{ secrets.IOS_TEAM_ID != '' }}
        run: |
          cd client/ios
          # Set development team in all project targets
          sed -i '' 's/ DEVELOPMENT_TEAM = .*/ DEVELOPMENT_TEAM = ${{ secrets.IOS_TEAM_ID }};/g' Runner.xcodeproj/project.pbxproj

      - name: Build IPA (signed)
        if: ${{ secrets.IOS_TEAM_ID != '' }}
        env:
          EXPORT_OPTS: |
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
            </dict>
            </plist>
        run: |
          echo "$EXPORT_OPTS" > /tmp/export-options.plist
          flutter build ipa --release \
            --export-options-plist=/tmp/export-options.plist \
            --dart-define=SERVER_URL=https://${{ secrets.SERVER_HOST || 'vpn.example.com' }}:8080
        working-directory: client

      - name: Build for simulator (unsigned, testing only)
        if: ${{ secrets.IOS_TEAM_ID == '' }}
        run: |
          flutter build ios --debug --no-codesign
          echo "No iOS signing secrets — built for simulator only"
        working-directory: client

      - name: Get version
        id: get_version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "ipa_path=$(find client/build/ios/ipa -name '*.ipa' -type f | head -1 || echo 'none')" >> $GITHUB_OUTPUT

      - name: Upload IPA to release
        if: ${{ steps.get_version.outputs.ipa_path != 'none' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.get_version.outputs.ipa_path }}
          asset_name: vpn-client-ios-${{ steps.get_version.outputs.version }}.ipa
          tag: ${{ github.ref }}
          overwrite: true
