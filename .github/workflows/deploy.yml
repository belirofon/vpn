name: Deploy VPN Server

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy server code to remote
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: server/
          target: ~/vpn-server/
          strip_components: 1

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          DUCK_DNS_TOKEN: ${{ secrets.DUCK_DNS_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_FILE,DUCK_DNS_TOKEN
          script: |
            set -e
            cd ~/vpn-server

            # Create .env from secret if missing
            if [ ! -f .env ]; then
              printf '%s\n' "$ENV_FILE" > .env
              echo "DUCK_DNS_TOKEN=$DUCK_DNS_TOKEN" >> .env
              echo "=== .env created ==="
            fi

            # Download GeoIP database if missing
            if [ ! -f GeoLite2-Country.mmdb ]; then
              curl -sL -o GeoLite2-Country.mmdb \
                "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
              echo "=== GeoIP database downloaded ==="
            fi

            docker compose build --pull
            docker compose up -d

      - name: Health check
        env:
          DOMAIN: belirofon-vpn.duckdns.org
        run: |
          echo "Waiting for server to initialize..."
          for i in $(seq 1 12); do
            if curl -sf --max-time 5 https://$DOMAIN:8443/health > /dev/null 2>&1; then
              echo "=== Server is healthy (https://$DOMAIN:8443) ==="
              curl -s https://$DOMAIN:8443/health
              exit 0
            fi
            # Fallback: direct HTTP on port 8080
            if curl -sf --max-time 5 http://${{ secrets.SSH_HOST }}:8080/health > /dev/null 2>&1; then
              echo "=== Server is healthy (HTTP fallback) ==="
              exit 0
            fi
            sleep 5
          done
          echo "Health check FAILED"
          exit 1
