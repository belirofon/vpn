name: Deploy VPN Server

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync + Docker build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Create target directory
            mkdir -p ~/vpn-server

            # Seed .env from secret on first deploy
            if [ ! -f ~/vpn-server/.env ]; then
              cat > ~/vpn-server/.env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF
              echo "=== .env created ==="
            fi

            # Download GeoIP database if missing
            if [ ! -f ~/vpn-server/GeoLite2-Country.mmdb ]; then
              curl -sL -o ~/vpn-server/GeoLite2-Country.mmdb \
                "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
              echo "=== GeoIP database downloaded ==="
            fi

      - name: Rsync server code
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete --exclude '.env' --exclude '.git' --exclude '/server'
          remote_path: ~/vpn-server/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Build and restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/vpn-server
            docker compose build --pull
            docker compose up -d

      - name: Health check
        run: |
          echo "Waiting for server to initialize..."
          for i in $$(seq 1 12); do
            if curl -sf --max-time 5 http://${{ secrets.SSH_HOST }}:8080/health > /dev/null 2>&1; then
              echo "=== Server is healthy ==="
              curl -s http://${{ secrets.SSH_HOST }}:8080/health
              exit 0
            fi
            sleep 5
          done
          echo "Health check FAILED"
          exit 1
