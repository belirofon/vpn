name: Deploy VPN Server

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy server code to remote
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: server/
          target: ~/vpn-server/
          strip_components: 1

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          DUCK_DNS_TOKEN: ${{ secrets.DUCK_DNS_TOKEN }}
          DOMAIN: ${{ vars.DOMAIN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_FILE,DUCK_DNS_TOKEN,DOMAIN
          script: |
            set -e
            cd ~/vpn-server

            # Create .env from secret if missing
            if [ ! -f .env ]; then
              printf '%s\n' "$ENV_FILE" > .env
              echo "DUCK_DNS_TOKEN=$DUCK_DNS_TOKEN" >> .env
              echo "DOMAIN=$DOMAIN" >> .env
              echo "=== .env created ==="
            fi

            # Extract subdomain for DuckDNS (strip .duckdns.org suffix)
            SUBDOMAIN="${DOMAIN%.duckdns.org}"
            export SUBDOMAIN

            # Download GeoIP database if missing
            if [ ! -f GeoLite2-Country.mmdb ]; then
              curl -sL -o GeoLite2-Country.mmdb \
                "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
              echo "=== GeoIP database downloaded ==="
            fi

            docker compose build --pull
            docker compose up -d

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/vpn-server
            echo "Waiting for server to initialize..."
            for i in $(seq 1 12); do
              if docker compose exec -T vpn-server wget -qO- http://localhost:8080/health > /dev/null 2>&1; then
                echo "=== Server is healthy ==="
                docker compose exec -T vpn-server wget -qO- http://localhost:8080/health
                exit 0
              fi
              sleep 5
            done
            echo "Health check FAILED"
            exit 1
