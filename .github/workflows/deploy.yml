name: Deploy VPN Server

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package server code
        run: tar czf /tmp/server.tar.gz -C server/ --exclude='.env' --exclude='.git' --exclude='vpn-server' --exclude='vpn-test' --exclude='server' .

      - name: Copy to server and deploy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: /tmp/server.tar.gz
          target: ~/vpn-server/
          strip_components: 2

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/vpn-server
            tar xzf server.tar.gz
            rm -f server.tar.gz

            # Create .env from secret if missing
            if [ ! -f .env ]; then
              cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF
              echo "=== .env created ==="
            fi

            # Download GeoIP database if missing
            if [ ! -f GeoLite2-Country.mmdb ]; then
              curl -sL -o GeoLite2-Country.mmdb \
                "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"
              echo "=== GeoIP database downloaded ==="
            fi

            docker compose build --pull
            docker compose up -d

      - name: Health check
        run: |
          echo "Waiting for server to initialize..."
          for i in $$(seq 1 12); do
            if curl -sf --max-time 5 http://${{ secrets.SSH_HOST }}:8080/health > /dev/null 2>&1; then
              echo "=== Server is healthy ==="
              curl -s http://${{ secrets.SSH_HOST }}:8080/health
              exit 0
            fi
            sleep 5
          done
          echo "Health check FAILED"
          exit 1
