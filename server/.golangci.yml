# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/
run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - revive
    - gocyclo
    - gosec

linters-settings:
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test files can be more lenient
    - path: _test\.go
      linters:
        - gocyclo
        - gosec
