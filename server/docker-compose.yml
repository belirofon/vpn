services:
  # DuckDNS: auto-updates IP for belirofon-vpn.duckdns.org
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    restart: unless-stopped
    environment:
      - SUBDOMAINS=belirofon-vpn
      - TOKEN=${DUCK_DNS_TOKEN}
      - LOG_FILE=false

  # Caddy: reverse proxy with auto-HTTPS (Let's Encrypt)
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - vpn-server

  # Go server (internal, accessed via Caddy reverse proxy)
  vpn-server:
    build: .
    container_name: vpn-server
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - ./GeoLite2-Country.mmdb:/app/GeoLite2-Country.mmdb:ro
    environment:
      - SKIP_DOTENV=true
      - GEOIP_DB_PATH=/app/GeoLite2-Country.mmdb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
